<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFlow IPTV - Premium Latino & España</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --primary: #e50914;
            --secondary: #b91c1c;
            --bg-dark: #080a10;
            --bg-sidebar: #111827;
            --bg-card: #1f2937;
            --text-main: #f9fafb;
            --text-dim: #9ca3af;
            --accent: #fbbf24;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        aside {
            width: 280px;
            background: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }

        .sidebar-header {
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--primary);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .nav-menu {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
        }

        .nav-item {
            padding: 0.8rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            color: var(--text-dim);
            transition: all 0.2s;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(229, 9, 20, 0.1);
            color: var(--text-main);
        }

        .nav-item.active {
            border-left: 4px solid var(--primary);
        }

        .category-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #4b5563;
            margin: 1.5rem 0 0.5rem 1rem;
        }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        header {
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(8, 10, 16, 0.8);
            backdrop-filter: blur(10px);
            z-index: 50;
        }

        .search-bar {
            background: var(--bg-card);
            border-radius: 25px;
            padding: 0.5rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            width: 400px;
        }

        .search-bar input {
            background: transparent;
            border: none;
            color: white;
            outline: none;
            width: 100%;
        }

        /* Player */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1rem 2rem;
            overflow-y: auto;
        }

        .player-wrapper {
            width: 100%;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            aspect-ratio: 16 / 9;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
        }

        .status-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
            padding: 2rem;
        }

        .status-overlay.active { display: flex; }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Grid */
        .grid-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 2rem 0 1rem 0;
        }

        .channels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1.2rem;
            padding-bottom: 2rem;
        }

        .card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .card:hover {
            transform: translateY(-5px);
            background: #2d3748;
            border-color: var(--primary);
        }

        .card-logo {
            width: 70px;
            height: 70px;
            margin: 0 auto 0.8rem auto;
            background: rgba(255,255,255,0.03);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .card-logo img {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
        }

        .card-name {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-main);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Mobile Controls */
        #menuToggle { display: none; }

        @media (max-width: 768px) {
            aside {
                position: absolute;
                left: -280px;
                height: 100%;
                z-index: 1000;
            }
            aside.active { left: 0; }
            #menuToggle { display: block; cursor: pointer; font-size: 1.5rem; }
            .search-bar { width: 100%; margin-left: 1rem; }
        }

        /* Notifications */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--bg-card);
            border-left: 4px solid var(--primary);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none;
            z-index: 2000;
        }
    </style>
</head>
<body>

    <div class="toast" id="toast">Canal cargado correctamente</div>

    <aside id="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-satellite-dish"></i>
            StreamFlow TV
        </div>
        <div class="nav-menu">
            <div class="nav-item active" onclick="loadSource('all')">
                <i class="fas fa-globe"></i> Todos los Canales
            </div>

            <div class="category-title">Países</div>
            <div class="nav-item" onclick="loadSource('es')">
                <img src="https://flagcdn.com/w20/es.png" width="20"> España
            </div>
            <div class="nav-item" onclick="loadSource('mx')">
                <img src="https://flagcdn.com/w20/mx.png" width="20"> México
            </div>
            <div class="nav-item" onclick="loadSource('ar')">
                <img src="https://flagcdn.com/w20/ar.png" width="20"> Argentina
            </div>
            <div class="nav-item" onclick="loadSource('co')">
                <img src="https://flagcdn.com/w20/co.png" width="20"> Colombia
            </div>

            <div class="category-title">Contenido</div>
            <div class="nav-item" onclick="loadMovies()">
                <i class="fas fa-film"></i> Películas & Cine
            </div>
            <div class="nav-item" onclick="showLocalPlaylist()">
                <i class="fas fa-file-upload"></i> Subir Lista M3U
            </div>
        </div>
    </aside>

    <main>
        <header>
            <i class="fas fa-bars" id="menuToggle"></i>
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Busca tu canal favorito...">
            </div>
            <div style="display:flex; gap: 1rem; align-items: center;">
                <span id="channelCount" style="color:var(--text-dim); font-size:0.8rem;">0 Canales</span>
                <i class="fas fa-user-circle" style="font-size: 1.5rem; color: var(--text-dim);"></i>
            </div>
        </header>

        <div class="content-area">
            <div class="player-wrapper">
                <video id="video" controls autoplay></video>
                <div id="playerOverlay" class="status-overlay">
                    <div id="loader" class="spinner"></div>
                    <h3 id="statusText" style="margin-top:1rem;">Cargando señal...</h3>
                    <p id="errorAdvice" style="color:var(--text-dim); margin-top:0.5rem; font-size:0.9rem;"></p>
                    <button onclick="retryCurrent()" style="margin-top:1.5rem; padding: 0.6rem 2rem; background: var(--primary); border:none; border-radius:5px; color:white; cursor:pointer;">Reintentar</button>
                </div>
            </div>

            <div class="grid-header">
                <h2 id="gridTitle">Canales de Televisión</h2>
                <div style="display:flex; gap:0.5rem;">
                    <button onclick="sortBy('name')" style="background:transparent; border:1px solid #333; color:white; padding:0.3rem 0.8rem; border-radius:15px; font-size:0.7rem; cursor:pointer;">Nombre</button>
                    <button onclick="sortBy('group')" style="background:transparent; border:1px solid #333; color:white; padding:0.3rem 0.8rem; border-radius:15px; font-size:0.7rem; cursor:pointer;">Categoría</button>
                </div>
            </div>

            <div class="channels-grid" id="channelsGrid">
                <!-- Cards injected here -->
            </div>
        </div>
    </main>

    <script>
        // Configuración
        const SOURCES = {
            all: 'https://iptv-org.github.io/iptv/languages/spa.m3u',
            es: 'https://iptv-org.github.io/iptv/countries/es.m3u',
            mx: 'https://iptv-org.github.io/iptv/countries/mx.m3u',
            ar: 'https://iptv-org.github.io/iptv/countries/ar.m3u',
            co: 'https://iptv-org.github.io/iptv/countries/co.m3u'
        };

        const video = document.getElementById('video');
        const grid = document.getElementById('channelsGrid');
        const overlay = document.getElementById('playerOverlay');
        let hls = null;
        let allChannels = [];
        let currentUrl = '';

        // Limpieza de datos antiguos de la App anterior
        function clearLegacyData() {
            const keys = ['streamflow_perfiles', 'streamflow_token', 'streamflow_version', 'currentUser'];
            keys.forEach(k => localStorage.removeItem(k));
        }

        async function init() {
            clearLegacyData();
            loadSource('all');

            document.getElementById('menuToggle').onclick = () => document.getElementById('sidebar').classList.toggle('active');

            document.getElementById('searchInput').oninput = (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = allChannels.filter(c => c.name.toLowerCase().includes(term));
                renderChannels(filtered);
            };
        }

        async function loadSource(key) {
            showStatus('Actualizando lista...', true);
            try {
                const res = await fetch(SOURCES[key]);
                const text = await res.text();
                allChannels = parseM3U(text);
                renderChannels(allChannels);
                document.getElementById('channelCount').textContent = `${allChannels.length} Canales`;
                document.getElementById('gridTitle').textContent = `Canales: ${key === 'all' ? 'Internacional' : key.toUpperCase()}`;
                hideStatus();

                // Active link UI
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                event?.currentTarget?.classList?.add('active');

            } catch (e) {
                showStatus('Error al cargar la lista de canales.', false);
            }
        }

        function parseM3U(text) {
            const lines = text.split('\n');
            const result = [];
            let current = null;

            lines.forEach(line => {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    const name = line.split(',').pop();
                    const logoMatch = line.match(/tvg-logo="([^"]*)"/);
                    const groupMatch = line.match(/group-title="([^"]*)"/);
                    current = {
                        name: name.trim(),
                        logo: logoMatch ? logoMatch[1] : '',
                        group: groupMatch ? groupMatch[1] : 'General'
                    };
                } else if (line.startsWith('http') && current) {
                    current.url = line;
                    result.push(current);
                    current = null;
                }
            });
            return result;
        }

        function renderChannels(channels) {
            grid.innerHTML = '';
            channels.forEach(ch => {
                const div = document.createElement('div');
                div.className = 'card';
                div.onclick = () => playStream(ch.url, ch.name);

                const logo = ch.logo ? `<img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/150/111827/ffffff?text=TV'">` : `<i class="fas fa-tv" style="font-size:2rem; color:#333;"></i>`;

                div.innerHTML = `
                    <div class="card-logo">${logo}</div>
                    <div class="card-name" title="${ch.name}">${ch.name}</div>
                `;
                grid.appendChild(div);
            });
        }

        function playStream(url, name) {
            currentUrl = url;
            showStatus(`Cargando ${name}...`, true);

            if (hls) hls.destroy();

            if (Hls.isSupported()) {
                hls = new Hls({
                    xhrSetup: function (xhr, url) {
                        xhr.withCredentials = false;
                    },
                    manifestLoadingMaxRetry: 2
                });
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(e => console.log('Autoplay blocked'));
                    hideStatus();
                });

                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        handleError(data.type);
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', () => {
                    video.play();
                    hideStatus();
                });
                video.addEventListener('error', () => handleError('NETWORK_ERROR'));
            }
        }

        function handleError(type) {
            let msg = 'Error de conexión con el canal.';
            let advice = 'Este canal podría estar fuera de línea o requiere un reproductor con soporte CORS.';

            if (type === Hls.ErrorTypes.NETWORK_ERROR) {
                msg = 'Error de Red / CORS Blocked';
                advice = 'Muchos canales de TV bloquean la reproducción en navegadores web por seguridad. Intenta con otro canal.';
            }

            showStatus(msg, false);
            document.getElementById('errorAdvice').textContent = advice;
        }

        function showStatus(text, loading) {
            overlay.classList.add('active');
            document.getElementById('statusText').textContent = text;
            document.getElementById('errorAdvice').textContent = '';
        }

        function hideStatus() {
            overlay.classList.remove('active');
        }

        function retryCurrent() {
            if (currentUrl) playStream(currentUrl, 'Reintentando...');
        }

        function sortBy(key) {
            allChannels.sort((a, b) => (a[key] || "").localeCompare(b[key] || ""));
            renderChannels(allChannels);
        }

        function showLocalPlaylist() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.m3u,.m3u8';
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = () => {
                    allChannels = parseM3U(reader.result);
                    renderChannels(allChannels);
                    document.getElementById('channelCount').textContent = `${allChannels.length} Canales`;
                    document.getElementById('gridTitle').textContent = 'Lista Personalizada';
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function loadMovies() {
            grid.innerHTML = `
                <div style="grid-column: 1/-1; padding: 3rem; text-align: center;">
                    <i class="fas fa-film" style="font-size: 4rem; color: #333; margin-bottom: 1rem;"></i>
                    <h3>Catálogo de Películas (BETA)</h3>
                    <p style="color:#666; margin-top: 1rem;">Estamos indexando contenido legal de fuentes abiertas.<br>Por ahora puedes disfrutar de los canales de Cine en la lista principal.</p>
                </div>
            `;
            document.getElementById('gridTitle').textContent = 'Películas & Estrenos';
        }

        init();
    </script>
</body>
</html>

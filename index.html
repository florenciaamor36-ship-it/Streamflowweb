<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFlow IPTV - Contenido en Español</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --primary: #e50914;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #f5af19;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Header */
        header {
            padding: 1rem 2rem;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .search-container {
            position: relative;
            width: 300px;
        }

        .search-container input {
            width: 100%;
            padding: 0.6rem 1rem 0.6rem 2.5rem;
            border-radius: 20px;
            border: none;
            background: var(--bg-card);
            color: white;
            outline: none;
            border: 1px solid transparent;
            transition: all 0.3s;
        }

        .search-container input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(229, 9, 20, 0.3);
        }

        .search-container i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
        }

        /* Main Layout */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 2rem;
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* Player Section */
        .player-section {
            width: 100%;
        }

        .video-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: black;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
        }

        .channel-info {
            margin-top: 1.5rem;
            padding: 1.5rem;
            background: var(--bg-card);
            border-radius: 12px;
        }

        .channel-info h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .channel-info p {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        /* Channel Grid */
        .grid-section h2 {
            margin-bottom: 1rem;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .channels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
            max-height: 80vh;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        /* Scrollbar */
        .channels-grid::-webkit-scrollbar {
            width: 6px;
        }
        .channels-grid::-webkit-scrollbar-thumb {
            background: var(--bg-card);
            border-radius: 10px;
        }

        .channel-card {
            background: var(--bg-card);
            border-radius: 10px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            border: 1px solid transparent;
        }

        .channel-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            background: #2d3748;
        }

        .channel-card.active {
            border-color: var(--primary);
            background: rgba(229, 9, 20, 0.1);
        }

        .channel-logo {
            width: 60px;
            height: 60px;
            margin: 0 auto 0.8rem auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            overflow: hidden;
        }

        .channel-logo img {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
        }

        .channel-logo i {
            font-size: 2rem;
            color: var(--text-dim);
        }

        .channel-name {
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Status & Errors */
        .status-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            padding: 2rem;
            text-align: center;
        }

        .status-overlay.active {
            display: flex;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-msg {
            color: #ef4444;
            margin-bottom: 1rem;
        }

        .btn-retry {
            padding: 0.5rem 1.5rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        /* Movie Section Placeholder */
        .extra-section {
            margin-top: 3rem;
        }

        .movie-banner {
            width: 100%;
            height: 200px;
            background: linear-gradient(to right, rgba(0,0,0,0.8), transparent), url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?auto=format&fit=crop&q=80&w=1000');
            background-size: cover;
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 2rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <i class="fas fa-play-circle"></i>
            StreamFlow IPTV
        </div>
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Buscar canales en español...">
        </div>
    </header>

    <div class="container">
        <div class="player-section">
            <div class="video-container">
                <video id="video" controls></video>
                <div id="statusOverlay" class="status-overlay">
                    <div id="spinner" class="spinner"></div>
                    <div id="errorMsg" class="error-msg"></div>
                    <button id="retryBtn" class="btn-retry">Reintentar</button>
                </div>
            </div>
            <div class="channel-info">
                <h1 id="currentChannelName">Selecciona un canal</h1>
                <p id="currentChannelDesc">Bienvenido a StreamFlow. Disfruta de la mejor televisión en español de todo el mundo.</p>
            </div>

            <div class="extra-section">
                <h2><i class="fas fa-film"></i> Cine y Series</h2>
                <div class="movie-banner" style="margin-top:1rem;">
                    <div>
                        <h3>Próximamente: Catálogo de Películas</h3>
                        <p style="color: var(--text-dim); margin-top: 0.5rem;">Estamos trabajando para traerte el mejor contenido bajo demanda.</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid-section">
            <h2><i class="fas fa-list"></i> Canales TV</h2>
            <div class="channels-grid" id="channelsGrid">
                <!-- Canales se cargarán aquí -->
            </div>
        </div>
    </div>

    <script>
        const M3U_URL = 'https://iptv-org.github.io/iptv/languages/spa.m3u';
        const video = document.getElementById('video');
        const channelsGrid = document.getElementById('channelsGrid');
        const searchInput = document.getElementById('searchInput');
        const statusOverlay = document.getElementById('statusOverlay');
        const errorMsg = document.getElementById('errorMsg');
        const currentChannelName = document.getElementById('currentChannelName');
        const currentChannelDesc = document.getElementById('currentChannelDesc');

        let allChannels = [];
        let hls = null;

        // Initialize App
        async function init() {
            showStatus('Cargando lista de canales...', true);
            try {
                const response = await fetch(M3U_URL);
                const text = await response.text();
                allChannels = parseM3U(text);
                renderChannels(allChannels);
                hideStatus();

                if (allChannels.length > 0) {
                    playChannel(allChannels[0]);
                }
            } catch (err) {
                showStatus('Error al cargar la lista. Verifica tu conexión.', false);
            }
        }

        function parseM3U(data) {
            const lines = data.split('\n');
            const channels = [];
            let currentChannel = null;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line.startsWith('#EXTINF:')) {
                    const nameMatch = line.match(/,(.*)$/);
                    const logoMatch = line.match(/tvg-logo="([^"]*)"/);
                    const groupMatch = line.match(/group-title="([^"]*)"/);

                    currentChannel = {
                        name: nameMatch ? nameMatch[1].trim() : 'Canal Desconocido',
                        logo: logoMatch ? logoMatch[1] : null,
                        group: groupMatch ? groupMatch[1] : 'General',
                        url: ''
                    };
                } else if (line.startsWith('http')) {
                    if (currentChannel) {
                        currentChannel.url = line;
                        channels.push(currentChannel);
                        currentChannel = null;
                    }
                }
            }
            return channels;
        }

        function renderChannels(channels) {
            channelsGrid.innerHTML = '';
            channels.forEach(channel => {
                const card = document.createElement('div');
                card.className = 'channel-card';
                card.onclick = () => playChannel(channel);

                const logoHtml = channel.logo
                    ? `<img src="${channel.logo}" onerror="this.outerHTML='<i class=\'fas fa-tv\'></i>'">`
                    : `<i class="fas fa-tv"></i>`;

                card.innerHTML = `
                    <div class="channel-logo">${logoHtml}</div>
                    <div class="channel-name" title="${channel.name}">${channel.name}</div>
                `;
                channelsGrid.appendChild(card);
            });
        }

        function playChannel(channel) {
            // Update UI
            currentChannelName.textContent = channel.name;
            currentChannelDesc.textContent = `Transmitiendo ahora desde: ${channel.group}`;

            // Highlight active card
            document.querySelectorAll('.channel-card').forEach(card => {
                card.classList.toggle('active', card.querySelector('.channel-name').textContent === channel.name);
            });

            if (Hls.isSupported()) {
                if (hls) hls.destroy();
                hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,
                    backBufferLength: 60
                });

                hls.loadSource(channel.url);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(e => console.log("Auto-play prevented"));
                    hideStatus();
                });

                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                showStatus('Error de red: El flujo no responde o tiene bloqueo CORS.', false);
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                hls.recoverMediaError();
                                break;
                            default:
                                hls.destroy();
                                showStatus('Error fatal al reproducir este canal.', false);
                                break;
                        }
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // For Safari
                video.src = channel.url;
                video.addEventListener('loadedmetadata', () => {
                    video.play();
                });
            }
        }

        function showStatus(msg, loading) {
            statusOverlay.classList.add('active');
            errorMsg.textContent = msg;
            document.getElementById('spinner').style.display = loading ? 'block' : 'none';
            document.getElementById('retryBtn').style.display = loading ? 'none' : 'block';
        }

        function hideStatus() {
            statusOverlay.classList.remove('active');
        }

        // Search logic
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allChannels.filter(c =>
                c.name.toLowerCase().includes(term) ||
                c.group.toLowerCase().includes(term)
            );
            renderChannels(filtered);
        });

        document.getElementById('retryBtn').onclick = init;

        init();
    </script>
</body>
</html>
